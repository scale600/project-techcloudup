<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>project.techcloudup.com</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0d1117;
  --card: #161b22;
  --border: #30363d;
  --text: #c9d1d9;
  --muted: #8b949e;
  --green: #3fb950;
  --green-bg: rgba(63,185,80,0.15);
  --yellow: #d29922;
  --yellow-bg: rgba(210,153,34,0.15);
  --red: #f85149;
  --red-bg: rgba(248,81,73,0.15);
  --blue: #58a6ff;
}
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
  min-height: 100vh;
}
.container { max-width: 1200px; margin: 0 auto; padding: 24px 16px; }
header { margin-bottom: 32px; }
h1 { font-size: 24px; font-weight: 600; }
h1 span { color: var(--muted); font-weight: 400; font-size: 14px; margin-left: 8px; }

/* ── Summary Cards ──────────────────────────── */
.summary { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 32px; }
.summary-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 20px;
  text-align: center;
}
.summary-card .count { font-size: 36px; font-weight: 700; }
.summary-card .label { font-size: 13px; color: var(--muted); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
.summary-card.ok .count { color: var(--green); }
.summary-card.degraded .count { color: var(--yellow); }
.summary-card.down .count { color: var(--red); }

/* ── Grid ───────────────────────────────────── */
.grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 16px;
  transition: border-color 0.2s;
}
.card:hover { border-color: var(--muted); }
.card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
.card-name { font-size: 14px; font-weight: 600; }
.card-url { font-size: 11px; color: var(--muted); word-break: break-all; margin-top: 2px; }
.badge {
  font-size: 11px;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 12px;
  white-space: nowrap;
  text-transform: uppercase;
}
.badge.ok { background: var(--green-bg); color: var(--green); }
.badge.degraded { background: var(--yellow-bg); color: var(--yellow); }
.badge.down { background: var(--red-bg); color: var(--red); }
.card-footer { display: flex; justify-content: space-between; align-items: center; font-size: 11px; color: var(--muted); }
.card-label { color: var(--muted); }
.card-link { color: var(--blue); text-decoration: none; }
.card-link:hover { text-decoration: underline; }

/* ── Footer ─────────────────────────────────── */
footer { text-align: center; padding: 24px 0; color: var(--muted); font-size: 12px; }
.loading { text-align: center; padding: 60px 0; color: var(--muted); }
.error { text-align: center; padding: 60px 0; color: var(--red); }

/* ── Responsive ─────────────────────────────── */
@media (max-width: 768px) {
  .grid, .summary { grid-template-columns: 1fr; }
  h1 { font-size: 20px; }
}
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>TechCloudUp <span>19 projects live</span></h1>
  </header>

  <div class="summary" id="summary"></div>
  <div class="grid" id="grid">
    <div class="loading">Loading...</div>
  </div>
  <footer>
    Auto-refresh every 60s &middot; Last check: <span id="last-check">—</span>
  </footer>
</div>

<script>
const API = '/api/status';

function timeAgo(iso) {
  if (!iso) return '—';
  const diff = Date.now() - new Date(iso).getTime();
  const sec = Math.floor(diff / 1000);
  if (sec < 60) return `${sec}s ago`;
  const min = Math.floor(sec / 60);
  if (min < 60) return `${min}m ago`;
  return `${Math.floor(min / 60)}h ago`;
}

function render(data) {
  const { summary, projects, checked_at } = data;

  // Summary cards
  document.getElementById('summary').innerHTML = `
    <div class="summary-card ok">
      <div class="count">${summary.ok}</div>
      <div class="label">Healthy</div>
    </div>
    <div class="summary-card degraded">
      <div class="count">${summary.degraded}</div>
      <div class="label">Degraded</div>
    </div>
    <div class="summary-card down">
      <div class="count">${summary.down}</div>
      <div class="label">Down</div>
    </div>`;

  // Project cards
  const grid = document.getElementById('grid');
  if (!projects || Object.keys(projects).length === 0) {
    grid.innerHTML = '<div class="error">No data yet. Waiting for first health check...</div>';
    return;
  }

  let html = '';
  for (const [id, p] of Object.entries(projects)) {
    const url = p.url ? new URL(p.url) : null;
    html += `
      <div class="card">
        <div class="card-header">
          <div>
            <div class="card-name">${p.name}</div>
            <div class="card-url">${url ? url.hostname : p.url}</div>
          </div>
          <span class="badge ${p.status}">${p.status}</span>
        </div>
        <div class="card-footer">
          <span class="card-label">${p.label}</span>
          <span>${timeAgo(p.checked_at)}</span>
        </div>
      </div>`;
  }
  grid.innerHTML = html;

  // Footer
  document.getElementById('last-check').textContent = timeAgo(checked_at);
}

async function fetchStatus() {
  try {
    const resp = await fetch(API);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();
    render(data);
  } catch (e) {
    document.getElementById('grid').innerHTML =
      `<div class="error">Failed to fetch: ${e.message}</div>`;
  }
}

fetchStatus();
setInterval(fetchStatus, 60000);
</script>
</body>
</html>
