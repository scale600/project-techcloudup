<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>project.techcloudup.com</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0d1117;
  --card: #161b22;
  --border: #30363d;
  --text: #c9d1d9;
  --muted: #8b949e;
  --green: #3fb950;
  --green-bg: rgba(63,185,80,0.15);
  --yellow: #d29922;
  --yellow-bg: rgba(210,153,34,0.15);
  --red: #f85149;
  --red-bg: rgba(248,81,73,0.15);
  --blue: #58a6ff;
  --header-bg: rgba(13,17,23,0.85);
}
[data-theme="light"] {
  --bg: #ffffff;
  --card: #f6f8fa;
  --border: #d0d7de;
  --text: #1f2328;
  --muted: #656d76;
  --green: #1a7f37;
  --green-bg: rgba(26,127,55,0.12);
  --yellow: #9a6700;
  --yellow-bg: rgba(154,103,0,0.12);
  --red: #cf222e;
  --red-bg: rgba(207,34,46,0.12);
  --blue: #0969da;
  --header-bg: rgba(255,255,255,0.85);
}
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
  min-height: 100vh;
  transition: background 0.3s, color 0.3s;
}
.container { max-width: 1200px; margin: 0 auto; padding: 24px 16px; }

/* ── Header ──────────────────────────────────── */
.toolbar {
  position: sticky; top: 0; z-index: 10;
  background: var(--header-bg); backdrop-filter: blur(8px);
  border-bottom: 1px solid var(--border);
  padding: 12px 0;
}
.toolbar-inner { max-width: 1200px; margin: 0 auto; padding: 0 16px; display: flex; justify-content: space-between; align-items: center; }
h1 { font-size: 22px; font-weight: 600; display: flex; align-items: baseline; gap: 8px; }
h1 span { color: var(--muted); font-weight: 400; font-size: 13px; }

.theme-toggle {
  background: var(--card); border: 1px solid var(--border);
  color: var(--text); border-radius: 6px; padding: 6px 12px;
  font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 6px;
  transition: border-color 0.2s;
}
.theme-toggle:hover { border-color: var(--muted); }
.theme-toggle .icon { font-size: 16px; }

/* ── Summary Cards ──────────────────────────── */
.summary { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin: 24px 0 28px; }
.summary-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 20px;
  text-align: center;
  cursor: pointer;
  transition: border-color 0.2s, transform 0.15s;
}
.summary-card:hover { border-color: var(--muted); transform: translateY(-1px); }
.summary-card .count { font-size: 40px; font-weight: 700; line-height: 1; }
.summary-card .label { font-size: 12px; color: var(--muted); margin-top: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
.summary-card.ok .count { color: var(--green); }
.summary-card.degraded .count { color: var(--yellow); }
.summary-card.down .count { color: var(--red); }

/* ── Grid ───────────────────────────────────── */
.grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 14px 16px;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.card:hover { border-color: var(--muted); box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
.card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
.card-name { font-size: 13px; font-weight: 600; }
.card-domain { font-size: 11px; color: var(--muted); margin-top: 2px; word-break: break-all; }
.badge {
  font-size: 10px; font-weight: 600; padding: 2px 8px;
  border-radius: 10px; white-space: nowrap; text-transform: uppercase;
  flex-shrink: 0;
}
.badge.ok { background: var(--green-bg); color: var(--green); }
.badge.degraded { background: var(--yellow-bg); color: var(--yellow); }
.badge.down { background: var(--red-bg); color: var(--red); }
.card-body { margin-bottom: 10px; }
.card-detail { font-size: 11px; color: var(--muted); }
.card-footer { display: flex; justify-content: space-between; align-items: center; font-size: 11px; color: var(--muted); border-top: 1px solid var(--border); padding-top: 10px; }
.card-link {
  color: var(--blue); text-decoration: none; font-weight: 500;
  display: inline-flex; align-items: center; gap: 3px;
}
.card-link:hover { text-decoration: underline; }
.card-link svg { width: 12px; height: 12px; }

/* ── Status dot ──────────────────────────────── */
.status-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 4px; }
.status-dot.ok { background: var(--green); }
.status-dot.degraded { background: var(--yellow); }
.status-dot.down { background: var(--red); }

/* ── Category filter ────────────────────────── */
.filters { display: flex; gap: 8px; margin-bottom: 18px; flex-wrap: wrap; }
.filter-btn {
  background: var(--card); border: 1px solid var(--border);
  color: var(--muted); border-radius: 16px; padding: 4px 14px;
  font-size: 12px; cursor: pointer; transition: all 0.2s;
}
.filter-btn:hover, .filter-btn.active { color: var(--text); border-color: var(--blue); background: rgba(88,166,255,0.1); }

footer { text-align: center; padding: 28px 0; color: var(--muted); font-size: 12px; }
.loading { text-align: center; padding: 60px 0; color: var(--muted); }
.error { text-align: center; padding: 60px 0; color: var(--red); }
.pulse { animation: pulse 2s infinite; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

/* ── Responsive ─────────────────────────────── */
@media (max-width: 900px) {
  .grid { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 600px) {
  .grid, .summary { grid-template-columns: 1fr; }
  h1 { font-size: 18px; }
  .container { padding: 16px 12px; }
}
</style>
</head>
<body>
<div class="toolbar">
  <div class="toolbar-inner">
    <h1>TechCloudUp <span>19 projects</span></h1>
    <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">
      <span class="icon" id="theme-icon">🌙</span> <span id="theme-label">Dark</span>
    </button>
  </div>
</div>
<div class="container">
  <div class="summary" id="summary"></div>
  <div class="filters" id="filters"></div>
  <div class="grid" id="grid">
    <div class="loading pulse">Loading projects...</div>
  </div>
  <footer>
    Refreshed <span id="last-check">—</span> &middot; Auto-update every 60s
    &middot; <a class="card-link" href="https://github.com/iviewio/project-techcloudup" target="_blank" rel="noopener">GitHub ↗</a>
  </footer>
</div>

<script>
const API = '/api/status';
let allProjects = {};
let activeFilter = 'all';

function timeAgo(iso) {
  if (!iso) return '—';
  const diff = Date.now() - new Date(iso).getTime();
  const sec = Math.floor(diff / 1000);
  if (sec < 60) return `${sec}s ago`;
  const min = Math.floor(sec / 60);
  if (min < 60) return `${min}m ago`;
  const h = Math.floor(min / 60);
  if (h < 24) return `${h}h ago`;
  return `${Math.floor(h / 24)}d ago`;
}

function toggleTheme() {
  const html = document.documentElement;
  const isDark = html.dataset.theme === 'dark';
  html.dataset.theme = isDark ? 'light' : 'dark';
  document.getElementById('theme-icon').textContent = isDark ? '☀️' : '🌙';
  document.getElementById('theme-label').textContent = isDark ? 'Light' : 'Dark';
  localStorage.setItem('theme', isDark ? 'light' : 'dark');
}

// Restore saved theme
(function() {
  const saved = localStorage.getItem('theme') || 'dark';
  document.documentElement.dataset.theme = saved;
  setTimeout(() => {
    document.getElementById('theme-icon').textContent = saved === 'dark' ? '🌙' : '☀️';
    document.getElementById('theme-label').textContent = saved === 'dark' ? 'Dark' : 'Light';
  }, 10);
})();

function renderFilters(projects) {
  const categories = {};
  for (const [, p] of Object.entries(projects)) {
    const cat = p.category || 'other';
    if (!categories[cat]) categories[cat] = 0;
    categories[cat]++;
  }
  let html = `<button class="filter-btn active" data-cat="all" onclick="setFilter('all')">All (19)</button>`;
  const labels = { admin: 'Admin', ai: 'AI', security: 'Security', iot: 'IoT', app: 'Apps', automation: 'Automation' };
  for (const [cat, count] of Object.entries(categories).sort()) {
    html += `<button class="filter-btn" data-cat="${cat}" onclick="setFilter('${cat}')">${labels[cat] || cat} (${count})</button>`;
  }
  document.getElementById('filters').innerHTML = html;
}

function setFilter(cat) {
  activeFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.cat === cat));
  renderGrid(allProjects);
}

function render(data) {
  const { summary, projects, checked_at } = data;
  allProjects = projects || {};

  // Summary
  document.getElementById('summary').innerHTML = `
    <div class="summary-card ok">
      <div class="count">${summary.ok}</div>
      <div class="label">Healthy</div>
    </div>
    <div class="summary-card degraded">
      <div class="count">${summary.degraded}</div>
      <div class="label">Degraded</div>
    </div>
    <div class="summary-card down">
      <div class="count">${summary.down}</div>
      <div class="label">Down</div>
    </div>`;

  // Filters (only on first load)
  if (!document.getElementById('filters').innerHTML.trim()) {
    renderFilters(allProjects);
  }

  renderGrid(allProjects);
  document.getElementById('last-check').textContent = timeAgo(checked_at);
}

function renderGrid(projects) {
  const grid = document.getElementById('grid');
  if (!projects || Object.keys(projects).length === 0) {
    grid.innerHTML = '<div class="error">No data yet. Waiting for first check...</div>';
    return;
  }

  const entries = Object.entries(projects).filter(([, p]) =>
    activeFilter === 'all' || p.category === activeFilter
  );

  if (entries.length === 0) {
    grid.innerHTML = '<div class="loading">No projects in this category.</div>';
    return;
  }

  grid.innerHTML = entries.map(([, p]) => {
    const domain = p.url ? new URL(p.url).hostname : '';
    const siteUrl = p.url ? new URL(p.url).origin + '/' : '#';
    return `
      <div class="card">
        <div class="card-header">
          <div>
            <div class="card-name">${p.name}</div>
            <div class="card-domain">${domain}</div>
          </div>
          <span class="badge ${p.status}">${p.status}</span>
        </div>
        <div class="card-body">
          <span class="card-detail"><span class="status-dot ${p.status}"></span>${p.label}</span>
          ${p.response_ms ? `<span class="card-detail" style="margin-left:8px">${p.response_ms}ms</span>` : ''}
        </div>
        <div class="card-footer">
          <a class="card-link" href="${siteUrl}" target="_blank" rel="noopener">
            <svg viewBox="0 0 16 16" fill="currentColor"><path fill-rule="evenodd" d="M3.75 2h8.5c.966 0 1.75.784 1.75 1.75v8.5A1.75 1.75 0 0112.25 14h-2.5a.75.75 0 010-1.5h2.5a.25.25 0 00.25-.25v-8.5a.25.25 0 00-.25-.25h-8.5a.25.25 0 00-.25.25v2.5a.75.75 0 01-1.5 0v-2.5C1.75 2.784 2.784 2 3.75 2z"/><path fill-rule="evenodd" d="M9.03 7.03a.75.75 0 010 1.06l-5.47 5.47a.75.75 0 01-1.06-1.06l5.47-5.47a.75.75 0 011.06 0z"/></svg>
            Visit
          </a>
          <span>${timeAgo(p.checked_at)}</span>
        </div>
      </div>`;
  }).join('');
}

async function fetchStatus() {
  try {
    const resp = await fetch(API);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    render(await resp.json());
  } catch (e) {
    document.getElementById('grid').innerHTML = `<div class="error">Failed to fetch: ${e.message}</div>`;
  }
}

fetchStatus();
setInterval(fetchStatus, 60000);
</script>
</body>
</html>
